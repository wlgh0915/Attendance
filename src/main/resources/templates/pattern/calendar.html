<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>근태 패턴 달력</title>
    <link rel="stylesheet" th:href="@{/css/pattern-calendar.css}">
</head>
<body>
<div layout:fragment="content">

    <!-- 플래시 메시지 (저장/삭제 후 리다이렉트 시) -->
    <div th:if="${successMessage}" class="toast-data" data-type="success"
         th:data-message="${successMessage}" style="display:none"></div>
    <div th:if="${errorMessage}" class="toast-data" data-type="error"
         th:data-message="${errorMessage}" style="display:none"></div>

<div class="cal-page">

    <!-- 제목 -->
    <div class="cal-header">
        <h2 class="cal-title">근태 패턴 달력</h2>
    </div>

    <!-- 네비게이션 + 액션 -->
    <div class="cal-nav">
        <a th:href="@{/pattern/calendar(year=${prevYear},month=${prevMonth})}" class="btn-nav">&#8249; 이전</a>
        <span class="month-label" th:text="${calendar.year + '년 ' + calendar.month + '월'}"></span>
        <a th:href="@{/pattern/calendar(year=${nextYear},month=${nextMonth})}" class="btn-nav">다음 &#8250;</a>

        <input type="month" id="monthPicker" class="month-picker"
               th:value="${yearMonthStr}" aria-label="월 선택">

        <div class="cal-actions">
            <button id="btnEdit"   class="btn-action-sel btn-edit-sel"   disabled>수정</button>
            <button id="btnAdd"    class="btn-action-sel btn-add-sel">추가</button>
            <span class="cal-divider"></span>
            <button id="btnDelete" class="btn-action-sel btn-delete-sel" disabled>삭제</button>
            <span   id="selCount"  class="selected-count"></span>
        </div>
    </div>

    <!-- 본문 -->
    <div class="cal-body">

        <!-- 달력 테이블 -->
        <div class="cal-table-wrap">
            <table class="cal-table">
                <thead>
                <tr>
                    <th class="col-check">
                        <input type="checkbox" id="checkAll" aria-label="전체 선택">
                    </th>
                    <th class="col-code">패턴코드</th>
                    <th class="col-name">패턴명</th>
                    <th th:each="hdr, hdrStat : ${calendar.dayHeaders}"
                        th:class="${calendar.dayCssClasses[hdrStat.index]}"
                        th:text="${hdr}">
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(calendar.rows)}">
                    <td th:colspan="${calendar.dates.size() + 3}" class="no-data">
                        등록된 패턴이 없습니다.
                    </td>
                </tr>
                <tr th:each="row : ${calendar.rows}"
                    th:data-pattern-code="${row.workPatternCode}">
                    <td class="col-check">
                        <input type="checkbox" class="row-check" aria-label="행 선택">
                    </td>
                    <td class="col-code" th:text="${row.workPatternCode}"></td>
                    <td class="col-name" th:text="${row.workPatternName}"></td>
                    <td th:each="date, dateStat : ${calendar.dates}">
                        <th:block th:with="sc=${row.shiftCodes[dateStat.index]}">
                            <span th:if="${sc != null}"
                                  class="shift-cell"
                                  th:data-shift="${sc}"
                                  th:text="${sc}"></span>
                            <span th:if="${sc == null}"
                                  class="shift-cell empty">-</span>
                        </th:block>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 범례 -->
        <div class="legend-panel">
            <h4>근태코드 범례</h4>
            <div id="legendBody"></div>
        </div>

    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
const SHIFT_NAMES = /*[[${calendar.shiftNameMap}]]*/ {};
const SHIFT_TIMES  = /*[[${calendar.shiftTimeMap}]]*/ {};

const PALETTE = [
    '#AED6F1', '#ABEBC6', '#F9E79F', '#F8B88B',
    '#D7BDE2', '#85C1E2', '#A9DFBF', '#F5B7B1',
    '#82E0AA', '#FAD7A0', '#BB8FCE', '#5DADE2',
    '#F8C471', '#90EE90', '#FFB6D9', '#B0E0E6'
];

const colorMap = {};
let colorIdx = 0;

function getColor(code) {
    if (!colorMap[code]) {
        colorMap[code] = PALETTE[colorIdx % PALETTE.length];
        colorIdx++;
    }
    return colorMap[code];
}

document.addEventListener('DOMContentLoaded', function () {

    /* ── sessionStorage 토스트 (fetch 삭제 후 리로드 시) ── */
    const pendingToast = sessionStorage.getItem('calendarToast');
    if (pendingToast) {
        sessionStorage.removeItem('calendarToast');
        try {
            const t = JSON.parse(pendingToast);
            if (typeof showToast === 'function') showToast(t.message, t.type);
        } catch (e) {}
    }

    /* ── 색상 초기화 ── */
    Object.keys(SHIFT_NAMES).forEach(function (code) { getColor(code); });

    document.querySelectorAll('.shift-cell[data-shift]').forEach(function (cell) {
        cell.style.backgroundColor = getColor(cell.dataset.shift);
    });

    /* ── 범례 ── */
    const legendBody = document.getElementById('legendBody');
    const allCodes   = Object.keys(SHIFT_NAMES);
    if (allCodes.length === 0) {
        legendBody.innerHTML = '<div style="font-size:12px;color:#bdc3c7;">등록된 근태코드 없음</div>';
    } else {
        allCodes.forEach(function (code) {
            const color = getColor(code);
            const name  = SHIFT_NAMES[code] || code;
            const time  = SHIFT_TIMES[code]  || '';
            legendBody.innerHTML +=
                '<div class="legend-item">' +
                '<span class="legend-dot" style="background:' + color + '"></span>' +
                '<div class="legend-info">' +
                '<div class="legend-name">' + name + '</div>' +
                '<div class="legend-code">' + code + '</div>' +
                (time ? '<div class="legend-time">' + time + '</div>' : '') +
                '</div></div>';
        });
    }

    /* ── 월 선택기 ── */
    document.getElementById('monthPicker').addEventListener('change', function () {
        if (!this.value) return;
        const parts = this.value.split('-');
        location.href = '/pattern/calendar?year=' + parts[0] + '&month=' + parseInt(parts[1], 10);
    });

    /* ── 추가 버튼 ── */
    document.getElementById('btnAdd').addEventListener('click', function () {
        location.href = '/pattern/new';
    });

    /* ── 체크박스 ── */
    const checkAll  = document.getElementById('checkAll');
    const rowChecks = document.querySelectorAll('.row-check');
    const btnEdit   = document.getElementById('btnEdit');
    const btnDelete = document.getElementById('btnDelete');
    const selCount  = document.getElementById('selCount');

    function getCheckedCodes() {
        return Array.from(rowChecks)
            .filter(function (cb) { return cb.checked; })
            .map(function (cb) { return cb.closest('tr').dataset.patternCode; });
    }

    function updateToolbar() {
        const codes = getCheckedCodes();
        btnEdit.disabled   = codes.length !== 1;
        btnDelete.disabled = codes.length === 0;
        selCount.textContent = codes.length > 0 ? codes.length + '개 선택' : '';
        checkAll.checked       = rowChecks.length > 0 && codes.length === rowChecks.length;
        checkAll.indeterminate = codes.length > 0 && codes.length < rowChecks.length;
    }

    /* td 전체 클릭으로 체크박스 토글 */
    document.querySelectorAll('td.col-check').forEach(function (td) {
        td.addEventListener('click', function () {
            const cb = this.querySelector('.row-check');
            cb.checked = !cb.checked;
            cb.closest('tr').classList.toggle('row-selected', cb.checked);
            updateToolbar();
        });
    });

    rowChecks.forEach(function (cb) {
        cb.addEventListener('change', function () {
            cb.closest('tr').classList.toggle('row-selected', cb.checked);
            updateToolbar();
        });
    });

    checkAll.addEventListener('change', function () {
        rowChecks.forEach(function (cb) {
            cb.checked = checkAll.checked;
            cb.closest('tr').classList.toggle('row-selected', checkAll.checked);
        });
        updateToolbar();
    });

    /* ── 수정 버튼 ── */
    btnEdit.addEventListener('click', function () {
        const codes = getCheckedCodes();
        if (codes.length === 1) {
            location.href = '/pattern/edit/' + encodeURIComponent(codes[0]);
        }
    });

    /* ── 삭제 버튼 ── */
    btnDelete.addEventListener('click', async function () {
        const codes = getCheckedCodes();
        if (codes.length === 0) return;
        if (!confirm('선택한 패턴 ' + codes.length + '개를 삭제하시겠습니까?\n(' + codes.join(', ') + ')')) return;

        const failed = [];
        for (const code of codes) {
            try {
                await fetch('/pattern/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ workPatternCode: code }).toString()
                });
            } catch (e) {
                failed.push(code);
            }
        }

        const success = codes.length - failed.length;
        if (failed.length > 0) {
            sessionStorage.setItem('calendarToast', JSON.stringify({
                type: 'error',
                message: failed.join(', ') + ' 패턴은 삭제할 수 없습니다. (부서에서 사용 중)'
            }));
        } else {
            sessionStorage.setItem('calendarToast', JSON.stringify({
                type: 'success',
                message: success + '개 패턴이 삭제되었습니다.'
            }));
        }
        location.reload();
    });
});
/*]]>*/
</script>
</div>
</body>
</html>
