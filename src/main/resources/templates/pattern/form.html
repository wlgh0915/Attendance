<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>근태 패턴 등록</title>
    <link rel="stylesheet" th:href="@{/css/form-common.css}">
    <style>
        /* 전체 wrapper: align-items:center 유지 → 사이드바 유무와 무관하게 나머지 공간의 중앙 */
        .content-wrapper { padding: 28px 32px; }
        .form-container  { max-width: 960px; width: 100%; }

        /* ── 2열 레이아웃 ── */
        .form-layout {
            display: flex;
            gap: 28px;
            align-items: flex-start;
            width: 100%;
        }

        /* ── 두 카드 공통 높이 ── */
        .form-left,
        .form-right {
            height: calc(100vh - 265px);
            min-height: 420px;
        }

        /* ── 왼쪽 카드 ── */
        .form-left {
            width: 360px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #fff;
            border: 1px solid #dde1e6;
            border-radius: 8px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow-y: auto;
        }

        /* 카드 안 입력 필드: max-width 해제, 패딩 정리 */
        .form-left .form-group input,
        .form-left .form-group select {
            max-width: none;
            padding: 9px 12px;
            font-size: 14px;
            border-radius: 4px;
        }

        /* ── 오른쪽 카드 ── */
        .form-right {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: #fff;
            border: 1px solid #dde1e6;
            border-radius: 8px;
            padding: 20px 20px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* 공통 패널 헤더 (왼/오른쪽 카드 모두 사용) */
        .detail-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        .detail-section-header {
            font-size: 14px;
            font-weight: 700;
            color: #2c3e50;
            padding: 7px 14px;
            border-left: 4px solid #2c3e50;
            background: #f1f3f5;
            border-radius: 0 4px 4px 0;
            flex: 1;
        }

        .detail-hint {
            font-size: 12px;
            color: #95a5a6;
            margin: 0 0 10px;
            flex-shrink: 0;
        }

        /* 독립 스크롤 영역: 남은 높이를 모두 채움 */
        .detail-scroll-area {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #e0e4e8;
            border-radius: 6px;
            min-height: 0;          /* flex child가 축소될 수 있도록 */
        }

        /* ── 테이블 ── */
        .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .detail-table thead th {
            background: #2c3e50;
            color: #fff;
            padding: 10px 14px;
            text-align: center;
            border-right: 1px solid #3d5166;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .detail-table thead th:last-child { border-right: none; }

        .detail-table tr.week-header-row td {
            background: #ecf0f1;
            font-weight: 700;
            font-size: 12px;
            color: #2c3e50;
            padding: 5px 14px;
            border-top: 2px solid #bdc3c7;
        }

        .detail-table tr.day-row td {
            padding: 5px 10px;
            border-bottom: 1px solid #e8eaed;
            border-right: 1px solid #e8eaed;
            text-align: center;
            vertical-align: middle;
        }
        .detail-table tr.day-row td:last-child { border-right: none; }

        .detail-table tr.row-saturday td { background: #ebf5fb; }
        .detail-table tr.row-sunday   td { background: #fdf2f2; }

        .day-text { font-weight: 600; }
        .day-sat  { color: #2980b9; }
        .day-sun  { color: #e74c3c; }

        .detail-table select {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid #ced4da;
            border-radius: 3px;
            font-size: 13px;
            font-family: 'Malgun Gothic', sans-serif;
            background: #fff;
        }
        .detail-table select:focus { border-color: #2c3e50; outline: none; }

        /* ── 필터 버튼 ── */
        .btn-filter-toggle {
            padding: 5px 14px;
            border: 1px solid #2c3e50;
            border-radius: 4px;
            background: #fff;
            color: #2c3e50;
            font-size: 12px;
            font-family: 'Malgun Gothic', sans-serif;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn-filter-toggle.active { background: #2c3e50; color: #fff; }
        .btn-filter-group { display: flex; gap: 8px; }

        /* ── 저장 / 목록으로 버튼: 두 카드 바깥 아래, 오른쪽 카드 하단 정렬 ── */
        .form-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-left: calc(360px + 28px); /* 왼쪽 카드 너비 + gap */
            padding-top: 14px;
        }
        .form-actions .btn-submit {
            margin-top: 0;
            padding: 11px 32px;
            font-size: 14px;
        }
        /* btn-cancel: btn-submit과 동일한 외형, 슬레이트 그레이 */
        .btn-cancel {
            background-color: #546e7a;
            color: #fff;
            padding: 11px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Malgun Gothic', sans-serif;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }
        .btn-cancel:hover { background-color: #455a64; color: #fff; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="content-wrapper">
        <div class="form-container">

            <div class="form-header">
                <h2 th:text="${isEdit} ? '근태 패턴 수정' : '근태 패턴 등록'">근태 패턴 등록</h2>
            </div>

            <div th:if="${errorMessage}" class="global-error" th:text="${errorMessage}"></div>

            <form th:action="@{/pattern/save}" method="post" th:object="${pattern}" class="dept-form">
                <div class="form-layout">

                    <!-- ── 왼쪽: 입력 필드 ── -->
                    <div class="form-left">

                        <div class="detail-panel-header">
                            <div class="detail-section-header">패턴 기본 정보</div>
                        </div>

                        <div class="form-group">
                            <label class="required">패턴코드</label>
                            <input type="text" th:field="*{master.workPatternCode}"
                                   th:readonly="${isEdit}"
                                   placeholder="예: WD, 3S2">
                        </div>

                        <div class="form-group">
                            <label class="required">패턴명</label>
                            <input type="text" th:field="*{master.workPatternName}"
                                   placeholder="예: 주간조, 3조2교대">
                        </div>

                        <div class="form-group">
                            <label>패턴유형</label>
                            <select th:field="*{master.patternType}" data-field="patternType">
                                <option value="">선택하세요</option>
                                <option value="FIXED">고정형</option>
                                <option value="ROTATE">교대형</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>주기단위</label>
                            <select th:field="*{master.cycleUnit}" data-field="cycleUnit">
                                <option value="">선택하세요</option>
                                <option value="W">주(W)</option>
                                <option value="D">일(D)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>주기횟수</label>
                            <input type="number" th:field="*{master.cycleCount}" data-field="cycleCount"
                                   min="1" max="31" placeholder="예: 1">
                        </div>

                        <div class="form-group">
                            <label class="required">시작일</label>
                            <input type="date"
                                   id="master_startDate"
                                   name="master.startDate"
                                   th:value="${pattern.master.startDate != null ? #temporals.format(pattern.master.startDate, 'yyyy-MM-dd') : ''}"
                                   data-role="startDate">
                        </div>

                        <div class="form-group">
                            <label>종료일</label>
                            <input type="date"
                                   id="master_endDate"
                                   name="master.endDate"
                                   th:value="${pattern.master.endDate != null ? #temporals.format(pattern.master.endDate, 'yyyy-MM-dd') : ''}">
                        </div>

                        <div class="form-group">
                            <label>사용여부</label>
                            <select th:field="*{master.useYn}">
                                <option value="Y">Y - 사용</option>
                                <option value="N">N - 미사용</option>
                            </select>
                        </div>

                    </div><!-- /form-left -->

                    <!-- ── 오른쪽: 일별 근태코드 ── -->
                    <div class="form-right">

                        <div class="detail-panel-header">
                            <div class="detail-section-header">일별 근태코드 설정</div>
                            <div class="btn-filter-group">
                                <button type="button" class="btn-filter-toggle" onclick="copyFirstCycle()">첫 주기 복사</button>
                                <button type="button" id="filterToggleBtn" class="btn-filter-toggle" onclick="toggleWorkDayFilter()">근무일만 표시</button>
                            </div>
                        </div>
                        <p class="detail-hint">시작일 입력 시 요일이 자동 표시됩니다. 주 52시간 규칙에 맞게 설정하세요.</p>

                        <div class="detail-scroll-area">
                            <table id="detailTable" class="detail-table">
                                <thead>
                                <tr>
                                    <th style="width:55px;">일차</th>
                                    <th style="width:50px;">요일</th>
                                    <th>근태코드</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="detail, stat : *{details}" class="day-row">
                                    <td>
                                        <span th:text="${detail.seq}"></span>
                                        <input type="hidden" th:field="*{details[__${stat.index}__].seq}">
                                    </td>
                                    <td><span class="day-text">-</span></td>
                                    <td>
                                        <select th:field="*{details[__${stat.index}__].shiftCode}">
                                            <option value="">-- 선택 --</option>
                                            <option th:each="shift : ${shiftCodes}"
                                                    th:value="${shift.shiftCode}"
                                                    th:attr="data-wdt=${shift.workDayType}"
                                                    th:text="${shift.shiftCode + ' - ' + shift.shiftName + (shift.workOnHhmm != null ? ' (' + shift.workOnHhmm + '~' + shift.workOffHhmm + ')' : '')}">
                                            </option>
                                        </select>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div><!-- /detail-scroll-area -->

                    </div><!-- /form-right -->

                </div><!-- /form-layout -->

                <!-- ── 버튼: 두 카드 바깥, 오른쪽 카드 하단 정렬 ── -->
                <div class="form-actions">
                    <button type="submit" class="btn-submit">저장</button>
                    <a th:href="@{/pattern/calendar}" class="btn-cancel">목록으로</a>
                </div>

            </form>
        </div>
    </div>

<script>
    const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];
    let optionsTemplate = '';
    let showWorkDayOnly = false;

    function captureOptionsTemplate() {
        const firstSel = document.querySelector('#detailTable tbody tr.day-row select');
        if (firstSel) optionsTemplate = firstSel.innerHTML;
    }

    function getStartDate() {
        const input = document.querySelector('[data-role="startDate"]');
        if (!input || !input.value) return null;
        const d = new Date(input.value + 'T00:00:00');
        return isNaN(d.getTime()) ? null : d;
    }

    function getPatternDays() {
        const typeEl  = document.querySelector('[data-field="patternType"]');
        const unitEl  = document.querySelector('[data-field="cycleUnit"]');
        const countEl = document.querySelector('[data-field="cycleCount"]');
        const type  = typeEl  ? typeEl.value  : 'FIXED';
        const unit  = unitEl  ? unitEl.value  : 'W';
        const count = Math.max(1, parseInt(countEl ? countEl.value : '1') || 1);
        if (!type || type === 'FIXED') return 28;
        if (unit === 'W') return count * 7;
        return count * 4;
    }

    function getCycleSize() {
        const unitEl  = document.querySelector('[data-field="cycleUnit"]');
        const countEl = document.querySelector('[data-field="cycleCount"]');
        const unit  = unitEl  ? unitEl.value  : 'W';
        const count = Math.max(1, parseInt(countEl ? countEl.value : '1') || 1);
        return unit === 'W' ? 7 : count;
    }

    function insertWeekHeaders() {
        const tbody = document.querySelector('#detailTable tbody');
        if (!tbody) return;
        tbody.querySelectorAll('tr.week-header-row').forEach(function(r) { r.remove(); });
        const rows = Array.from(tbody.querySelectorAll('tr.day-row'));
        const cycleSize = getCycleSize();
        const unitEl = document.querySelector('[data-field="cycleUnit"]');
        const unit = unitEl ? unitEl.value : 'W';
        const cycleLabel = unit === 'W' ? '주' : '회차';
        if (rows.length <= cycleSize) return;
        rows.forEach(function(row, index) {
            if (index % cycleSize === 0) {
                const headerRow = document.createElement('tr');
                headerRow.className = 'week-header-row';
                headerRow.innerHTML = '<td colspan="3">▶ ' + (Math.floor(index / cycleSize) + 1) + cycleLabel + '</td>';
                row.parentNode.insertBefore(headerRow, row);
            }
        });
    }

    function updateDayLabels() {
        const startDate = getStartDate();
        const cycleSize = getCycleSize();
        document.querySelectorAll('#detailTable tbody tr.day-row').forEach(function(row, index) {
            const label = row.querySelector('.day-text');
            if (!label) return;
            if (!startDate) { label.textContent = '-'; label.className = 'day-text'; return; }
            const d = new Date(startDate);
            d.setDate(d.getDate() + (index % cycleSize));
            const dow = d.getDay();
            label.textContent = DAY_NAMES[dow];
            label.className = 'day-text' + (dow === 6 ? ' day-sat' : dow === 0 ? ' day-sun' : '');
            row.classList.remove('row-saturday', 'row-sunday');
            if (dow === 6) row.classList.add('row-saturday');
            if (dow === 0) row.classList.add('row-sunday');
        });
    }

    function updateTable() {
        insertWeekHeaders();
        updateDayLabels();
        applyWorkDayFilter();
    }

    function toggleWorkDayFilter() {
        showWorkDayOnly = !showWorkDayOnly;
        const btn = document.getElementById('filterToggleBtn');
        btn.classList.toggle('active', showWorkDayOnly);
        btn.textContent = showWorkDayOnly ? '전체 표시' : '근무일만 표시';
        applyWorkDayFilter();
    }

    function isOffDayRow(row) {
        const sel = row.querySelector('select');
        if (!sel) return false;
        if (!sel.value) return true;
        const opt = sel.querySelector('option[value="' + sel.value + '"]');
        if (!opt) return false;
        const wdt = opt.dataset.wdt || '';
        return wdt === 'OFF' || wdt === 'HOLIDAY';
    }

    function copyFirstCycle() {
        const tbody = document.querySelector('#detailTable tbody');
        const dayRows = Array.from(tbody.querySelectorAll('tr.day-row'));
        const cycleSize = getCycleSize();
        if (dayRows.length <= cycleSize) { alert('표시된 행이 1주기뿐입니다.'); return; }
        const hasCode = dayRows.slice(0, cycleSize).some(function(row) {
            const sel = row.querySelector('select');
            return sel && sel.value;
        });
        if (!hasCode) { alert('첫 주기의 근태코드를 먼저 입력해주세요.'); return; }
        for (let i = cycleSize; i < dayRows.length; i++) {
            const sourceSel = dayRows[i % cycleSize].querySelector('select');
            const targetSel = dayRows[i].querySelector('select');
            if (sourceSel && targetSel) targetSel.value = sourceSel.value;
        }
        applyWorkDayFilter();
    }

    function applyWorkDayFilter() {
        const tbody = document.querySelector('#detailTable tbody');
        if (!tbody) return;
        tbody.querySelectorAll('tr.day-row').forEach(function(row) {
            row.style.display = (showWorkDayOnly && isOffDayRow(row)) ? 'none' : '';
        });
        tbody.querySelectorAll('tr.week-header-row').forEach(function(header) {
            let next = header.nextElementSibling;
            let anyVisible = false;
            while (next && !next.classList.contains('week-header-row')) {
                if (next.classList.contains('day-row') && next.style.display !== 'none') {
                    anyVisible = true;
                    break;
                }
                next = next.nextElementSibling;
            }
            header.style.display = anyVisible ? '' : 'none';
        });
    }

    function rebuildDetailRows(days) {
        const tbody = document.querySelector('#detailTable tbody');
        const saved = [];
        tbody.querySelectorAll('tr.day-row').forEach(function(row) {
            const sel = row.querySelector('select');
            saved.push(sel ? sel.value : '');
        });
        tbody.innerHTML = '';
        for (let i = 0; i < days; i++) {
            const tr = document.createElement('tr');
            tr.className = 'day-row';

            const td1 = document.createElement('td');
            td1.innerHTML = '<span>' + (i + 1) + '</span>' +
                '<input type="hidden" name="details[' + i + '].seq" value="' + (i + 1) + '">';

            const td2 = document.createElement('td');
            td2.innerHTML = '<span class="day-text">-</span>';

            const sel = document.createElement('select');
            sel.name = 'details[' + i + '].shiftCode';
            sel.innerHTML = optionsTemplate;
            if (saved[i]) sel.value = saved[i];
            sel.addEventListener('change', function() { if (showWorkDayOnly) applyWorkDayFilter(); });

            const td3 = document.createElement('td');
            td3.appendChild(sel);

            tr.appendChild(td1);
            tr.appendChild(td2);
            tr.appendChild(td3);
            tbody.appendChild(tr);
        }
        updateTable();
    }

    document.addEventListener('DOMContentLoaded', function() {
        captureOptionsTemplate();
        updateTable();

        const startDateInput = document.querySelector('[data-role="startDate"]');
        if (startDateInput) {
            startDateInput.addEventListener('change', updateTable);
            startDateInput.addEventListener('input', updateTable);
        }

        const typeEl  = document.querySelector('[data-field="patternType"]');
        const unitEl  = document.querySelector('[data-field="cycleUnit"]');
        const countEl = document.querySelector('[data-field="cycleCount"]');

        if (typeEl) {
            typeEl.addEventListener('change', function() {
                if (this.value === 'FIXED') {
                    if (unitEl)  unitEl.value  = 'W';
                    if (countEl) countEl.value = '1';
                }
                rebuildDetailRows(getPatternDays());
            });
        }
        if (unitEl)  unitEl.addEventListener('change',  function() { rebuildDetailRows(getPatternDays()); });
        if (countEl) {
            countEl.addEventListener('change', function() { rebuildDetailRows(getPatternDays()); });
            countEl.addEventListener('input',  function() { rebuildDetailRows(getPatternDays()); });
        }
    });
</script>
</div>
</body>
</html>
