<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="sideNavFragment">
    <aside class="sidebar">
        <ul class="menu-list">
            <li class="menu-item">
                <a th:href="@{/departments}" class="menu-link">부서 관리</a>
            </li>
            <li class="menu-item">
                <a th:href="@{/work-patterns}" class="menu-link">근태 패턴 관리</a>
            </li>

            <li class="menu-item has-sub">
                <div class="menu-title-wrapper" onclick="toggleSubMenu(this)">
                    <span class="menu-title">근태 신청 및 변경</span>
                    <span class="arrow-icon">▼</span>
                </div>
                <ul class="sub-menu">
                    <li><a th:href="@{/}">연장근로 신청</a></li>
                    <li><a th:href="@{/}">기타 근태 신청</a></li>
                    <li><a th:href="@{/}">휴일 근로 신청</a></li>
                    <li><a th:href="@{/}">조퇴/외출/반차 신청</a></li>
                    <li><a th:href="@{/}">근태 신청 내역</a></li>
                </ul>
            </li>

            <li class="menu-item">
                <a th:href="@{/attendance/department}" class="menu-link">부서 근태 조회</a>
            </li>

            <li class="menu-item">
                <a th:href="@{/dept/approval}" class="menu-link">부서원 근태 승인</a>
            </li>

            <li>
                <a th:href="@{/attendance/department/week}" class="menu-link">부서별 주 근태조회</a>
            </li>

            <li>
                <a th:href="@{/attendance/department/month}" class="menu-link">부서별 월 근태조회</a>
            </li>
        </ul>
        <div class="logout-section">
            <form th:action="@{/logout}" method="post" onsubmit="return confirm('로그아웃 하시겠습니까?');">
                <button type="submit" class="logout-btn">
                    <span class="icon">⊘</span> 로그아웃
                </button>
            </form>
        </div>
    </aside>

    <script>
        function toggleSubMenu(element) {
            // 클릭된 메뉴의 부모(li.has-sub)를 찾음
            const parent = element.parentElement;

            // active 클래스가 있으면 제거, 없으면 추가
            parent.classList.toggle('active');

            // 화살표 방향 변경을 위한 로직
            const arrow = element.querySelector('.arrow-icon');
            if (parent.classList.contains('active')) {
                arrow.innerText = '▲';
            } else {
                arrow.innerText = '▼';
            }
        }
    </script>

    <style>
        .sidebar { width: 260px; background: #2c3e50; color: white; min-height: 100vh; font-family: 'Malgun Gothic', sans-serif; }
        .menu-list { list-style: none; padding: 0; margin: 0; }

        /* 공통 스타일 */
        .menu-link, .menu-title-wrapper {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: #ecf0f1;
            text-decoration: none;
            transition: background 0.3s;
        }

        .menu-link:hover, .menu-title-wrapper:hover { background: #34495e; }

        /* 서브메뉴 스타일 */
        .sub-menu {
            list-style: none;
            padding: 0;
            background: #1a252f;
            display: none; /* 기본 숨김 */
        }

        .sub-menu li a {
            display: block;
            padding: 10px 20px 10px 40px;
            color: #bdc3c7;
            text-decoration: none;
            font-size: 14px;
        }

        .sub-menu li a:hover { color: white; background: #3e5871; }

        /* Active 상태일 때 서브메뉴 보이기 */
        .menu-item.active .sub-menu {
            display: block;
        }

        .arrow-icon { font-size: 10px; }

        .logout-section {
            margin-top: auto; /* 사이드바에 flex 설정이 있다면 하단으로 밀어냄 */
            padding: 20px;
            border-top: 1px solid #3e5871;
        }

        .logout-btn {
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .sidebar {
            display: flex;
            flex-direction: column; /* 로그아웃 버튼을 아래로 보내기 위해 필요 */
            height: 100vh;
        }
    </style>
</div>
</html>
