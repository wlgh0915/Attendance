<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <title>근태 관리 시스템</title>
    <link rel="stylesheet" th:href="@{/css/success-banner.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div layout:fragment="content">

    <div th:if="${successMessage}" class="success-banner">
        <span>✓</span>
        <span th:text="${successMessage}"></span>
    </div>

    <div class="home-wrapper">
        <div class="home-card">
            <div class="welcome-section">
                <div class="name-line">
                    <span class="emp-name" th:text="${session.loginUser.empName}">홍길동</span>
                    <span class="name-suffix">님</span>
                </div>
                <div class="welcome-line">환영합니다.</div>
            </div>

            <div class="home-actions">
                <a href="#" class="home-btn">
                    <span>내 정보 확인하기</span>
                </a>
                <a href="#" class="home-btn home-btn--outline">
                    <span>시스템 사용법</span>
                </a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
