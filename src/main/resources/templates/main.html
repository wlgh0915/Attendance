<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <title>근태 관리 시스템</title>
    <link rel="stylesheet" th:href="@{/css/success-banner.css}">
</head>
<body>
<div layout:fragment="content">
    <div th:if="${successMessage}" class="success-banner">
        <span>✓</span>
        <span th:text="${successMessage}"></span>
    </div>

    <h2>근태 관리 시스템</h2>
    <p>
        <span th:text="${session.loginUser.empName}"></span>님 환영합니다.
    </p>
</div>
</body>
</html>
