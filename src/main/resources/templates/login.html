<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 근태 관리 시스템</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<!-- 배경 이미지 레이어 -->
<div class="login-bg"></div>

<!-- 카드 래퍼 -->
<div class="login-wrap">
    <div class="login-card">

        <!-- 로고 -->
        <div class="login-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"
                 fill="none" stroke="#ffffff" stroke-width="1.8">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
        </div>

        <!-- 타이틀 -->
        <div class="login-title-area">
            <h1 class="login-title">근태 관리 시스템</h1>
            <p class="login-sub">Attendance Management System</p>
        </div>

        <!-- 폼 -->
        <form th:action="@{/login}" th:object="${loginRequestDto}" method="post" class="login-form">

            <!-- 전역 에러 -->
            <div th:if="${#fields.hasGlobalErrors()}" class="global-error">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <!-- 회사코드 -->
            <div class="lf-group">
                <label class="lf-label">회사 코드</label>
                <div class="lf-input-wrap">
                    <span class="lf-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                    </span>
                    <select th:field="*{company}" class="lf-select">
                        <option value="">회사를 선택하세요</option>
                        <option th:each="company : ${companyOptions}"
                                th:value="${company.company}"
                                th:text="${company.company} + ' - ' + ${company.companyName}">
                        </option>
                    </select>
                    <span class="lf-select-arrow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </span>
                </div>
                <div class="lf-error" th:errors="*{company}"></div>
            </div>

            <!-- 사원번호 -->
            <div class="lf-group">
                <label class="lf-label">사원 번호</label>
                <div class="lf-input-wrap">
                    <span class="lf-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" th:field="*{empCode}" class="lf-input" placeholder="Employee ID">
                </div>
                <div class="lf-error" th:errors="*{empCode}"></div>
            </div>

            <!-- 비밀번호 -->
            <div class="lf-group">
                <label class="lf-label">비밀번호</label>
                <div class="lf-input-wrap">
                    <span class="lf-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" th:field="*{password}" class="lf-input" placeholder="Password">
                </div>
                <div class="lf-error" th:errors="*{password}"></div>
            </div>

            <!-- ID 저장 -->
            <div class="lf-remember">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">ID 저장</label>
            </div>


            <!-- 로그인 버튼 -->
            <button type="submit" class="btn-login">
                로그인
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>

        </form>

        <!-- 보안 배지 -->

        <div class="login-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="#3b82f6" stroke-width="2.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span>보안 SSL 연결 활성화됨</span>
        </div>

    </div>
</div>

<!-- 하단 푸터 -->
<footer class="login-footer">
    <p>© 2025 Attendance Management Systems. All rights reserved.</p>
    <div class="login-footer-links">
        <a href="#">개인정보 처리방침</a>
        <a href="#">고객 지원</a>
    </div>
</footer>

<script>
(function () {
    const KEY_EMP = 'login_empCode';
    const KEY_CO  = 'login_company';

    const empInput = document.getElementById('empCode');
    const coSelect = document.getElementById('company');
    const checkbox = document.getElementById('rememberMe');
    const form     = document.querySelector('.login-form');

    // 페이지 로드 시 저장된 값 복원
    const savedEmp = localStorage.getItem(KEY_EMP);
    const savedCo  = localStorage.getItem(KEY_CO);
    if (savedEmp) {
        empInput.value   = savedEmp;
        checkbox.checked = true;
    }
    if (savedCo) {
        coSelect.value = savedCo;
    }

    // 폼 제출 시 저장 or 삭제
    form.addEventListener('submit', function () {
        if (checkbox.checked) {
            localStorage.setItem(KEY_EMP, empInput.value);
            localStorage.setItem(KEY_CO,  coSelect.value);
        } else {
            localStorage.removeItem(KEY_EMP);
            localStorage.removeItem(KEY_CO);
        }
    });
})();
</script>
</body>
</html>
