<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <title>사원 등록 - 근태 관리 시스템</title>
    <link rel="stylesheet" th:href="@{/css/form-common.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="content-wrapper">
        <div class="form-container">
            <div class="form-header">
                <h2>사원 등록</h2>
            </div>

            <form th:action="@{/users/new}" th:object="${userCreateDto}" method="post" class="user-form">

                <div th:if="${#fields.hasGlobalErrors()}" class="toast-data" data-type="error"
                     th:data-message="${#strings.listJoin(#fields.globalErrors(), ' | ')}" style="display:none"></div>

                <div class="form-group">
                    <label class="required">회사코드</label>
                    <input type="text" th:field="*{company}" readonly>
                    <div class="error-text" th:errors="*{company}"></div>
                </div>

                <div class="form-group">
                    <label class="required">사번</label>
                    <input type="text" th:field="*{empCode}" placeholder="사원 번호를 입력하세요">
                    <div class="error-text" th:errors="*{empCode}"></div>
                </div>

                <div class="form-group">
                    <label class="required">이름</label>
                    <input type="text" th:field="*{empName}" placeholder="성함을 입력하세요">
                    <div class="error-text" th:errors="*{empName}"></div>
                </div>

                <div class="form-group">
                    <label class="required">비밀번호</label>
                    <input type="password" th:field="*{password}" placeholder="초기 비밀번호 설정">
                    <div class="error-text" th:errors="*{password}"></div>
                </div>

                <div class="form-group">
                    <label>부서</label>
                    <select th:field="*{deptCode}">
                        <option value="">선택하세요</option>
                        <option th:each="dept : ${deptOptions}"
                                th:value="${dept.deptCode}"
                                th:text="${dept.deptCode} + ' - ' + ${dept.deptName}">
                        </option>
                    </select>
                    <div class="error-text" th:errors="*{deptCode}"></div>
                </div>

                <div class="form-group">
                    <label class="required">권한</label>
                    <select th:field="*{roleCode}">
                        <option value="">선택하세요</option>
                        <option value="USER">USER - 일반 사용자</option>
                        <option value="ADMIN">ADMIN - 관리자</option>
                    </select>
                    <div class="error-text" th:errors="*{roleCode}"></div>
                </div>

                <button type="submit" class="btn-submit">등록하기</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
