<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>사원 수정 - 근태 관리 시스템</title>
    <link rel="stylesheet" th:href="@{/css/user-create.css}">
</head>
<body>
<div layout:fragment="content">
<div class="uc-page">

    <!-- 페이지 헤더 -->
    <div class="uc-top">
        <div>
            <h2 class="uc-title">사원 수정</h2>
            <p class="uc-subtitle">사원 정보를 수정하고 저장합니다.</p>
        </div>
        <a th:href="${userUpdateDto.returnDeptCode != null and !#strings.isEmpty(userUpdateDto.returnDeptCode)} ? @{/departments/employees(deptCode=${userUpdateDto.returnDeptCode})} : @{/departments}" class="btn-uc-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            목록으로
        </a>
    </div>

    <!-- 폼 -->
    <form th:action="@{/users/{empCode}/edit(empCode=${userUpdateDto.empCode})}"
          th:object="${userUpdateDto}" method="post" class="uc-form">

        <!-- 히든 필드 -->
        <input type="hidden" th:field="*{hireDate}">
        <input type="hidden" th:field="*{originalPositionCode}">
        <input type="hidden" th:field="*{originalPositionDate}">
        <input type="hidden" th:field="*{originalDutyCode}">
        <input type="hidden" th:field="*{originalDutyDate}">
        <input type="hidden" th:field="*{returnDeptCode}">

        <!-- 전역 에러 토스트 -->
        <div th:if="${#fields.hasGlobalErrors()}" class="toast-data" data-type="error"
             th:data-message="${#strings.listJoin(#fields.globalErrors(), ' | ')}" style="display:none"></div>

        <div class="uc-card">

            <!-- ── 기본 정보 섹션 ── -->
            <div class="uc-section">
                <div class="uc-section-header">
                    <div class="uc-section-icon icon-blue">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                             fill="none" stroke="#2563eb" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <h3 class="uc-section-title">기본 정보</h3>
                </div>

                <div class="uc-grid">

                    <div class="uc-field">
                        <label class="uc-label">사번</label>
                        <input type="text" th:field="*{empCode}" class="uc-input uc-readonly" readonly>
                        <div class="uc-error" th:errors="*{empCode}"></div>
                    </div>

                    <div class="uc-field">
                        <label class="uc-label uc-required">이름</label>
                        <input type="text" th:field="*{empName}" class="uc-input" placeholder="성함을 입력하세요">
                        <div class="uc-error" th:errors="*{empName}"></div>
                    </div>

                    <div class="uc-field">
                        <label class="uc-label">비밀번호 <span class="uc-auto">(변경 시에만 입력)</span></label>
                        <input type="password" th:field="*{password}" class="uc-input" placeholder="변경할 비밀번호 입력">
                        <div class="uc-error" th:errors="*{password}"></div>
                    </div>

                    <div class="uc-field">
                        <label class="uc-label">입사일</label>
                        <input type="date" th:value="*{hireDate}" class="uc-input uc-readonly" readonly>
                    </div>

                </div>
            </div>

            <div class="uc-divider"></div>

            <!-- ── 조직 정보 섹션 ── -->
            <div class="uc-section">
                <div class="uc-section-header">
                    <div class="uc-section-icon icon-slate">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                             fill="none" stroke="#475569" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                        </svg>
                    </div>
                    <h3 class="uc-section-title">조직 정보</h3>
                </div>

                <div class="uc-grid">

                    <div class="uc-field">
                        <label class="uc-label">부서</label>
                        <select th:field="*{deptCode}" class="uc-select">
                            <option value="">선택하세요</option>
                            <option th:each="dept : ${deptOptions}"
                                    th:value="${dept.deptCode}"
                                    th:text="${dept.deptCode + ' - ' + dept.deptName}">
                            </option>
                        </select>
                        <div class="uc-error" th:errors="*{deptCode}"></div>
                    </div>

                    <div class="uc-field">
                        <label class="uc-label">직위</label>
                        <select th:field="*{positionCode}" class="uc-select">
                            <option value="">선택하세요</option>
                            <option th:each="position : ${positionOptions}"
                                    th:value="${position.positionCode}"
                                    th:text="${position.positionCode + ' - ' + position.positionName}">
                            </option>
                        </select>
                        <div class="uc-error" th:errors="*{positionCode}"></div>
                    </div>

                    <div class="uc-field">
                        <label class="uc-label">직위 발령일</label>
                        <input type="date" th:field="*{positionDate}" class="uc-input">
                        <div class="uc-error" th:errors="*{positionDate}"></div>
                    </div>

                    <div class="uc-field">
                        <label class="uc-label">직책</label>
                        <select th:field="*{dutyCode}" class="uc-select">
                            <option value="">선택하세요</option>
                            <option th:each="duty : ${dutyOptions}"
                                    th:value="${duty.dutyCode}"
                                    th:text="${duty.dutyCode + ' - ' + duty.dutyName}">
                            </option>
                        </select>
                        <div class="uc-error" th:errors="*{dutyCode}"></div>
                    </div>

                    <div class="uc-field">
                        <label class="uc-label">직책 발령일</label>
                        <input type="date" th:field="*{dutyDate}" class="uc-input">
                        <div class="uc-error" th:errors="*{dutyDate}"></div>
                    </div>

                    <div class="uc-field">
                        <label class="uc-label uc-required">권한</label>
                        <select th:field="*{roleCode}" class="uc-select">
                            <option value="">선택하세요</option>
                            <option th:each="role : ${roleOptions}"
                                    th:value="${role.roleCode}"
                                    th:text="${role.roleCode + ' - ' + role.roleName}">
                            </option>
                        </select>
                        <div class="uc-error" th:errors="*{roleCode}"></div>
                    </div>

                </div>
            </div>

        </div><!-- /uc-card -->

        <!-- 폼 액션 -->
        <div class="uc-actions">
            <a th:href="${userUpdateDto.returnDeptCode != null and !#strings.isEmpty(userUpdateDto.returnDeptCode)} ? @{/departments/employees(deptCode=${userUpdateDto.returnDeptCode})} : @{/departments}" class="btn-uc-cancel">취소</a>
            <button type="submit" class="btn-uc-submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                수정 저장
            </button>
        </div>

    </form>

</div><!-- /uc-page -->

<div id="toast"></div>

<script>
    const toastData = document.querySelector('.toast-data');
    if (toastData) {
        const msg  = toastData.getAttribute('data-message');
        const type = toastData.getAttribute('data-type') || 'error';
        if (msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = type;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 4000);
        }
    }
</script>
</div><!-- /layout:fragment="content" -->
</body>
</html>
