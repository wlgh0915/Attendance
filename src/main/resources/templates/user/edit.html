<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <title>사원 수정 - 근태 관리 시스템</title>
    <link rel="stylesheet" th:href="@{/css/form-common.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="content-wrapper">
        <div class="form-container">
            <div class="form-header">
                <h2>사원 수정</h2>
            </div>

            <form th:action="@{/users/{empCode}/edit(empCode=${userUpdateDto.empCode})}"
                  th:object="${userUpdateDto}" method="post" class="user-form">

                <input type="hidden" th:field="*{originalPositionCode}">
                <input type="hidden" th:field="*{originalPositionDate}">
                <input type="hidden" th:field="*{originalDutyCode}">
                <input type="hidden" th:field="*{originalDutyDate}">
                <input type="hidden" th:field="*{returnDeptCode}">

                <div th:if="${#fields.hasGlobalErrors()}" class="toast-data" data-type="error"
                     th:data-message="${#strings.listJoin(#fields.globalErrors(), ' | ')}" style="display:none"></div>

                <div class="form-group">
                    <label class="required">회사코드</label>
                    <input type="text" th:field="*{company}" readonly>
                    <div class="error-text" th:errors="*{company}"></div>
                </div>

                <div class="form-group">
                    <label class="required">사번</label>
                    <input type="text" th:field="*{empCode}" readonly>
                    <div class="error-text" th:errors="*{empCode}"></div>
                </div>

                <div class="form-group">
                    <label class="required">이름</label>
                    <input type="text" th:field="*{empName}" placeholder="성함을 입력하세요">
                    <div class="error-text" th:errors="*{empName}"></div>
                </div>

                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" th:field="*{password}" placeholder="변경할 때만 입력하세요">
                    <div class="error-text" th:errors="*{password}"></div>
                </div>

                <div class="form-group">
                    <label>부서</label>
                    <select th:field="*{deptCode}">
                        <option value="">선택하세요</option>
                        <option th:each="dept : ${deptOptions}"
                                th:value="${dept.deptCode}"
                                th:text="${dept.deptCode} + ' - ' + ${dept.deptName}">
                        </option>
                    </select>
                    <div class="error-text" th:errors="*{deptCode}"></div>
                </div>

                <div class="form-group">
                    <label>직위</label>
                    <select th:field="*{positionCode}">
                        <option value="">선택하세요</option>
                        <option th:each="position : ${positionOptions}"
                                th:value="${position.positionCode}"
                                th:text="${position.positionCode} + ' - ' + ${position.positionName}">
                        </option>
                    </select>
                    <div class="error-text" th:errors="*{positionCode}"></div>
                </div>

                <div class="form-group">
                    <label>직위일자</label>
                    <input type="date" th:field="*{positionDate}">
                    <div class="error-text" th:errors="*{positionDate}"></div>
                </div>

                <div class="form-group">
                    <label>직책</label>
                    <select th:field="*{dutyCode}">
                        <option value="">선택하세요</option>
                        <option th:each="duty : ${dutyOptions}"
                                th:value="${duty.dutyCode}"
                                th:text="${duty.dutyCode} + ' - ' + ${duty.dutyName}">
                        </option>
                    </select>
                    <div class="error-text" th:errors="*{dutyCode}"></div>
                </div>

                <div class="form-group">
                    <label>직책일자</label>
                    <input type="date" th:field="*{dutyDate}">
                    <div class="error-text" th:errors="*{dutyDate}"></div>
                </div>

                <div class="form-group">
                    <label class="required">권한</label>
                    <select th:field="*{roleCode}">
                        <option value="">선택하세요</option>
                        <option th:each="role : ${roleOptions}"
                                th:value="${role.roleCode}"
                                th:text="${role.roleCode} + ' - ' + ${role.roleName}">
                        </option>
                    </select>
                    <div class="error-text" th:errors="*{roleCode}"></div>
                </div>

                <button type="submit" class="btn-submit">수정하기</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
