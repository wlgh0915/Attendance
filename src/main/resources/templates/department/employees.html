<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>부서 사원 목록</title>
    <link rel="stylesheet" th:href="@{/css/department-list.css}">
    <link rel="stylesheet" th:href="@{/css/success-banner.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="content-wrapper">
        <div th:if="${successMessage}" class="success-banner">
            <span>✓</span>
            <span th:text="${successMessage}"></span>
        </div>

        <h2>부서 사원 목록</h2>

        <p>
            회사코드: <span th:text="${company}"></span> /
            부서코드: <span th:text="${deptCode}"></span>
        </p>

        <p>
            <a th:href="@{/departments}">부서 목록으로</a>
        </p>

        <table>
            <thead>
            <tr>
                <th>회사코드</th>
                <th>사번</th>
                <th>사원명</th>
                <th>부서코드</th>
                <th>권한코드</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.company}"></td>
                <td th:text="${emp.empCode}"></td>
                <td th:text="${emp.empName}"></td>
                <td th:text="${emp.deptCode}"></td>
                <td th:text="${emp.roleCode}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="5">해당 부서에 등록된 사원이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
