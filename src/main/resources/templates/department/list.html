<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>부서 목록</title>
    <link rel="stylesheet" th:href="@{/css/department-list.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="content-wrapper">
        <div th:if="${successMessage}" class="toast-data" data-type="success" th:data-message="${successMessage}" style="display:none"></div>
        <h2>부서 목록</h2>
        <table>
            <thead>
            <tr>
                <th>회사명</th>
                <th>부서코드</th>
                <th>부서명</th>
                <th>상위부서</th>
                <th>부서장</th>
                <th>부서분류</th>
                <th>사용여부</th>
                <th>운영 상태</th>
                <th class="action-header">사원 목록</th>
                <th class="action-header">부서 수정</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="dept : ${departments}">
                <td th:text="${dept.companyName}"></td>
                <td th:text="${dept.deptCode}"></td>
                <td th:text="${dept.deptName}"></td>
                <td th:text="${dept.parentDeptName != null ? dept.parentDeptName : ''}"></td>
                <td th:text="${dept.deptLeaderName != null ? dept.deptLeaderName : ''}"></td>
                <td>
                    <span th:switch="${dept.deptCategory}">
                        <span th:case="'10'">10 - CEO</span>
                        <span th:case="'20'">20 - COO</span>
                        <span th:case="'21'">21 - 위원회</span>
                        <span th:case="'30'">30 - 본부</span>
                        <span th:case="'40'">40 - 팀</span>
                        <span th:case="'41'">41 - 부</span>
                        <span th:case="'50'">50 - 과</span>
                        <span th:case="'60'">60 - 그룹</span>
                        <span th:case="'70'">70 - 파트</span>
                        <span th:case="*"></span>
                    </span>
                </td>
                <td th:text="${dept.useYn}"></td>
                <td>
                    <span th:if="${dept.dateStatus == 'ACTIVE'}"
                          class="status-badge active"
                          th:title="${dept.endDate != null ? '운영 중 (' + dept.startDate + ' ~ ' + dept.endDate + ')' : '운영 중 (' + dept.startDate + ' ~ )'}">운영중</span>
                    <span th:if="${dept.dateStatus == 'INACTIVE'}"
                          class="status-badge inactive"
                          th:title="'운영 종료 (' + ${dept.startDate} + ' ~ ' + ${dept.endDate} + ')'">운영종료</span>
                </td>
                <td class="action-cell">
                    <a th:href="@{/departments/employees(company=${dept.company}, deptCode=${dept.deptCode})}"
                       class="btn-action btn-view">보기</a>
                </td>
                <td class="action-cell">
                    <a th:href="@{/departments/edit(company=${dept.company}, deptCode=${dept.deptCode})}"
                       class="btn-action btn-edit">수정</a>
                </td>
            </tr>
            <tr class="unassigned-dept-row">
                <td>-</td>
                <td>-</td>
                <td><strong>부서 미지정</strong></td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
                <td class="action-cell">
                    <a th:href="@{/departments/employees/unassigned-manage(company=${company})}"
                       class="btn-action btn-view">보기</a>
                </td>
                <td class="action-cell">-</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
