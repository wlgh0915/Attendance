<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>부서 등록</title>
</head>
<body>
<div layout:fragment="content">
    <h2>부서 등록</h2>

    <form th:action="@{/departments/new}" th:object="${departmentCreateDto}" method="post">
        <div>
            <label>회사코드</label>
            <input type="text" th:field="*{company}" readonly>
            <div th:errors="*{company}"></div>
        </div>

        <div>
            <label>부서코드</label>
            <input type="text" th:field="*{deptCode}">
            <div th:errors="*{deptCode}"></div>
        </div>

        <div>
            <label>부서명</label>
            <input type="text" th:field="*{deptName}">
            <div th:errors="*{deptName}"></div>
        </div>

        <div>
            <label>상위부서코드</label>
            <input type="text" th:field="*{parentDept}">
        </div>

        <div>
            <label>부서장 사번</label>
            <input type="text" th:field="*{deptLeader}">
        </div>

        <div>
            <label>부서분류</label>
            <input type="text" th:field="*{deptCategory}">
        </div>

        <div>
            <label>근태패턴코드</label>
            <input type="text" th:field="*{workPatternCode}">
        </div>

        <div>
            <label>사용여부</label>
            <input type="text" th:field="*{useYn}">
        </div>

        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>

        <button type="submit">등록</button>
        <a th:href="@{/departments}">목록</a>
    </form>
</div>
</body>
</html>
