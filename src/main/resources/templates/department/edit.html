<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>부서 수정 - 근태 관리 시스템</title>
    <link rel="stylesheet" th:href="@{/css/form-common.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="content-wrapper">
        <div class="form-container">
            <div class="form-header">
                <h2>부서 수정</h2>
            </div>

            <form th:action="@{/departments/edit}" th:object="${departmentUpdateDto}" method="post" class="dept-form">
                <div th:if="${#fields.hasGlobalErrors()}" class="toast-data" data-type="error"
                     th:data-message="${#strings.listJoin(#fields.globalErrors(), ' | ')}" style="display:none"></div>

                <div class="form-group">
                    <label class="required">회사코드</label>
                    <input type="text" th:field="*{company}" readonly>
                    <div class="error-text" th:errors="*{company}"></div>
                </div>

                <div class="form-group">
                    <label class="required">부서코드</label>
                    <input type="text" th:field="*{deptCode}" readonly>
                    <div class="error-text" th:errors="*{deptCode}"></div>
                </div>

                <div class="form-group">
                    <label class="required">부서명</label>
                    <input type="text" th:field="*{deptName}" placeholder="부서명을 입력하세요">
                    <div class="error-text" th:errors="*{deptName}"></div>
                </div>

                <div class="form-group">
                    <label>상위부서</label>
                    <select th:field="*{parentDept}">
                        <option value="">선택하세요</option>
                        <option th:each="dept : ${deptOptions}"
                                th:value="${dept.deptCode}"
                                th:text="${dept.deptCode} + ' - ' + ${dept.deptName}"
                                th:unless="${dept.deptCode == departmentUpdateDto.deptCode}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>부서장</label>
                    <select th:field="*{deptLeader}">
                        <option value="">선택하세요</option>
                        <option th:each="emp : ${employeeOptions}"
                                th:value="${emp.empCode}"
                                th:text="${emp.empCode} + ' - ' + ${emp.empName}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>부서분류</label>
                    <input type="text" th:field="*{deptCategory}" placeholder="부서 분류를 입력하세요">
                </div>

                <div class="form-group">
                    <label>근태패턴코드</label>
                    <input type="text" th:field="*{workPatternCode}" placeholder="근태 패턴 코드를 입력하세요">
                </div>

                <div class="form-group">
                    <label>시작 일자</label>
                    <input type="date" th:field="*{startDate}">
                </div>

                <div class="form-group">
                    <label>종료 일자</label>
                    <input type="date" th:field="*{endDate}">
                </div>

                <div class="form-group">
                    <label class="required">사용여부</label>
                    <select th:field="*{useYn}">
                        <option value="">선택하세요</option>
                        <option value="Y">Y - 사용</option>
                        <option value="N">N - 미사용</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">수정하기</button>

            </form>
        </div>
    </div>
</div>
</body>
</html>
