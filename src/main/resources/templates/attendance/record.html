<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>출퇴근 실적 관리</title>
    <link rel="stylesheet" th:href="@{/css/record.css}">
</head>
<body>
<div layout:fragment="content">
<div class="rec-page">

    <!-- 상단 컨트롤 -->
    <div class="rec-top">
        <div class="rec-nav">
            <a th:href="@{/attendance/record(ym=${prevYm}, empCode=${targetEmp}, deptCode=${selectedDept})}">&#9664;</a>
            <span class="ym-label" th:text="${ymDisplay}"></span>
            <a th:href="@{/attendance/record(ym=${nextYm}, empCode=${targetEmp}, deptCode=${selectedDept})}">&#9654;</a>
        </div>

        <div class="filter-group" th:if="${isAdmin}">
            <label>부서</label>
            <select id="deptSelect" onchange="onDeptChange(this.value)">
                <option th:each="d : ${depts}"
                        th:value="${d.deptCode}"
                        th:text="${d.deptName}"
                        th:selected="${d.deptCode == selectedDept}"></option>
            </select>
        </div>

        <div class="filter-group" th:if="${isAdmin}">
            <label>사원</label>
            <select id="empSelect" onchange="onEmpChange(this.value)">
                <option value="">-- 선택 --</option>
                <option th:each="e : ${emps}"
                        th:value="${e.empCode}"
                        th:text="${e.empName + ' (' + e.empCode + ')'}"
                        th:selected="${e.empCode == targetEmp}"></option>
            </select>
        </div>

        <div class="emp-badge" th:if="${empInfo != null}"
             th:text="${(empInfo['deptName'] != null ? empInfo['deptName'] : '') + ' | ' + (empInfo['empName'] != null ? empInfo['empName'] : '') + ' (' + targetEmp + ')'}">
        </div>
    </div>

    <!-- 실적 테이블 -->
    <table class="rec-table">
        <thead>
        <tr>
            <th>날짜</th><th>요일</th><th>계획근태</th><th>실적근태</th>
            <th>출근</th><th>퇴근</th><th>근무(분)</th><th>익일</th>
            <th th:if="${isAdmin}">관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row : ${rows}" th:classappend="${row.weekend ? 'weekend' : ''}">

            <td class="dt-col"
                th:classappend="${row.dayLabel == '일' ? 'col-sun' : (row.dayLabel == '토' ? 'col-sat' : '')}"
                th:text="${row.dateDisplay}"></td>

            <td th:classappend="${row.dayLabel == '일' ? 'col-sun' : (row.dayLabel == '토' ? 'col-sat' : '')}"
                th:text="${row.dayLabel}"></td>

            <td class="no-data" th:text="${row.shiftCode != null ? row.shiftCode : '-'}"></td>

            <td th:classappend="${row.actualShiftCode != null ? 'has-data' : 'no-data'}"
                th:text="${row.actualShiftCode != null ? row.actualShiftCode : '-'}"></td>

            <td th:classappend="${row.checkIn != null ? 'has-data' : 'no-data'}"
                th:text="${row.checkIn != null ? row.checkIn : '-'}"></td>

            <td th:classappend="${row.checkOut != null ? 'has-data' : 'no-data'}"
                th:text="${row.checkOut != null ? row.checkOut : '-'}"></td>

            <td class="no-data" th:text="${row.workMin != null ? row.workMin : '-'}"></td>

            <td class="no-data" th:text="${row.overnightYn != null ? row.overnightYn : '-'}"></td>

            <td th:if="${isAdmin}">
                <button class="btn-sm btn-edit"
                        th:text="${row.hasRecord ? '수정' : '등록'}"
                        th:attr="data-ymd=${row.yyyymmdd},
                                 data-has=${row.hasRecord},
                                 data-shift=${row.shiftCode},
                                 data-actual=${row.actualShiftCode},
                                 data-ci=${row.checkIn},
                                 data-co=${row.checkOut},
                                 data-wm=${row.workMin},
                                 data-on=${row.overnightYn}"
                        onclick="openModal(this)"></button>
                <button th:if="${row.hasRecord}"
                        class="btn-sm btn-delete"
                        th:attr="data-ymd=${row.yyyymmdd}"
                        onclick="doDelete(this.dataset.ymd)">삭제</button>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<!-- 등록/수정 모달 -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
    <div class="modal">
        <h3 id="modalTitle">출퇴근 실적 등록</h3>
        <div class="modal-row">
            <label>날짜</label>
            <input type="text" id="mDate" readonly>
        </div>
        <div class="modal-row">
            <label>계획근태코드</label>
            <select id="mShiftCode">
                <option value="">-- 선택 --</option>
            </select>
        </div>
        <div class="modal-row">
            <label>실적근태코드</label>
            <select id="mActualShiftCode">
                <option value="">-- 선택 --</option>
            </select>
        </div>
        <div class="modal-row">
            <label>출근 / 퇴근</label>
            <div class="row-2">
                <input type="time" id="mCheckIn"  oninput="autoCalcWorkMin()">
                <input type="time" id="mCheckOut" oninput="autoCalcWorkMin()">
            </div>
        </div>
        <div class="modal-row">
            <label>익일여부</label>
            <select id="mOvernightYn" onchange="autoCalcWorkMin()">
                <option value="N">N (당일 퇴근)</option>
                <option value="Y">Y (익일 퇴근)</option>
            </select>
        </div>
        <div class="modal-row">
            <label>실근무분 (자동계산)</label>
            <input type="number" id="mWorkMin" min="0" placeholder="분">
        </div>
        <p class="modal-note">출근·퇴근 입력 시 실근무분이 자동 계산됩니다.</p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModalDirect()">취소</button>
            <button class="btn-save"   onclick="doSave()">저장</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script th:inline="javascript">
    const TARGET_EMP    = /*[[${targetEmp}]]*/ '';
    const SELECTED_DEPT = /*[[${selectedDept}]]*/ '';
    const CURRENT_YM    = /*[[${currentYm}]]*/ '';
    const IS_ADMIN      = /*[[${isAdmin}]]*/ false;
</script>
<script th:src="@{/js/record.js}"></script>
</div>
</body>
</html>
