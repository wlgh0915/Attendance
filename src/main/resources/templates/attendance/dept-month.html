<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>부서별 월 근태조회</title>
    <link rel="stylesheet" th:href="@{/css/dept-month.css}">
</head>
<body>
<div layout:fragment="content">
<div class="dm-page">

    <!-- 상단 컨트롤 -->
    <div class="dm-top">
        <div class="dm-nav">
            <a th:href="@{/attendance/department/month(ym=${prevYm}, deptCode=${selectedDept})}">&#9664;</a>
            <span class="ym-label" th:text="${ymDisplay}"></span>
            <a th:href="@{/attendance/department/month(ym=${nextYm}, deptCode=${selectedDept})}">&#9654;</a>
        </div>
        <div class="filter-group">
            <label>부서</label>
            <select onchange="onDeptChange(this.value)">
                <option th:each="d : ${depts}"
                        th:value="${d.deptCode}"
                        th:text="${d.deptName}"
                        th:selected="${d.deptCode == selectedDept}">
                </option>
            </select>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="dm-table-wrap">
        <table class="dm-table">
            <thead>
            <tr>
                <th class="th-emp">사원</th>
                <th class="th-work">월 근무</th>
                <th th:each="label,i : ${dayLabels}"
                    th:classappend="${#strings.contains(label,'(일)') ? 'th-sun' : (#strings.contains(label,'(토)') ? 'th-sat' : '')}"
                    th:text="${label}">
                </th>
            </tr>
            </thead>
            <tbody id="monthBody"></tbody>
        </table>
    </div>

</div><!-- /dm-page -->

<script th:inline="javascript">
    const MONTH_DATA    = /*[[${monthData}]]*/ [];
    const DAY_DATES     = /*[[${dayDates}]]*/ [];
    const SELECTED_DEPT = /*[[${selectedDept}]]*/ '';
    const CURRENT_YM    = /*[[${currentYm}]]*/ '';
</script>
<script th:src="@{/js/dept-month.js}"></script>
</div>
</body>
</html>
