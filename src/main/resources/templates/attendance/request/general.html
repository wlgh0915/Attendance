<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>일반근태 신청</title>
    <link rel="stylesheet" th:href="@{/css/request-general.css}">
</head>
<body>
<div layout:fragment="content">
<div class="req-page">

    <!-- 페이지 헤더 -->
    <div class="req-top">
        <div class="req-top-left">
            <h2 class="req-title">일반근태 신청</h2>
            <p class="req-subtitle">연장, 휴일 근로 및 기타 근태 변동 사항을 관리하고 신청합니다.</p>
        </div>
        <div class="category-tabs">
            <div class="category-tab active" data-cat="OVERTIME"  onclick="switchCategory(this)">연장근로</div>
            <div class="category-tab"        data-cat="HOLIDAY"   onclick="switchCategory(this)">휴일근로</div>
            <div class="category-tab"        data-cat="LEAVE"     onclick="switchCategory(this)">조퇴/외출/반차</div>
        </div>
    </div>

    <!-- 검색 필터 카드 -->
    <div class="search-panel">
        <div class="search-group">
            <label class="search-label">근무일</label>
            <input type="date" id="workDate" class="search-input" th:value="${today}">
        </div>
        <div class="search-group">
            <label class="search-label">부서</label>
            <select id="deptCode" class="search-select" th:disabled="${!canViewAll}">
                <option th:each="dept : ${depts}"
                        th:value="${dept.deptCode}"
                        th:text="${dept.deptName}"
                        th:selected="${dept.deptCode == myDeptCode}">
                </option>
            </select>
        </div>
        <div class="search-group" th:if="${canViewAll}">
            <label class="search-label">사번</label>
            <input type="text" id="empCodeFilter" class="search-input" placeholder="전체">
        </div>
        <div class="search-actions">
            <button class="btn-search" onclick="doSearch()">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                조회
            </button>
        </div>
    </div>

    <!-- 결과 테이블 카드 -->
    <div class="req-table-card">
        <div class="table-card-header">
            <div class="table-card-header-left">
                <h3 class="table-card-title">대상자 목록</h3>
                <span id="rowCountBadge" class="count-badge">총 0건</span>
            </div>
        </div>
        <div class="req-table-wrap">
            <table class="req-table">
                <thead>
                <tr>
                    <th class="th-check" onclick="clickCheckAllCell()">
                        <input type="checkbox" id="checkAll" onclick="event.stopPropagation();toggleAll(this)">
                    </th>
                    <th>사번</th>
                    <th>성명</th>
                    <th>부서</th>
                    <th>근무계획</th>
                    <th class="holiday-hidden">예정근무</th>
                    <th>실제근태</th>
                    <th class="holiday-hidden">실근무</th>
                    <th>예상근로시간</th>
                    <th class="leave-hidden">잔여연차</th>
                    <th>신청근무</th>
                    <th>사유</th>
                    <th>시작시간</th>
                    <th>종료시간</th>
                    <th>상태</th>
                    <th>신청자</th>
                </tr>
                </thead>
                <tbody id="reqTableBody">
                    <tr><td colspan="16" class="no-data">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <p>조회 버튼을 클릭하세요.</p>
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div><!-- /req-page -->

<!-- 하단 액션 바 -->
<div class="req-footer">
    <div class="req-footer-left">
        <span class="select-dot"></span>
        <p class="select-info">선택됨: <strong id="selectedCount">0</strong>개</p>
        <div class="footer-divider"></div>
        <p class="footer-hint">저장 시 즉시 목록에 반영되며 결재를 위해 상신이 필요합니다.</p>
    </div>
    <div class="req-footer-right">
        <button class="btn-act btn-delete" onclick="doDelete()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/>
            </svg>
            삭제
        </button>
        <button class="btn-act btn-save" onclick="doSave()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
            </svg>
            저장
        </button>
        <button class="btn-act btn-cancel-submit" onclick="doCancelSubmit()">상신취소</button>
        <button class="btn-act btn-submit" onclick="doSubmit()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            결재상신
        </button>
    </div>
</div>

<div id="toast"></div>

<!-- 시프트 코드 시간 데이터 -->
<div id="shiftTimesData" style="display:none">
    <span th:each="sc : ${shiftCodes}"
          th:data-code="${sc.shiftCode}"
          th:data-name="${sc.shiftName}"
          th:data-on="${sc.workOnHhmm}"
          th:data-off="${sc.workOffHhmm}"
          th:data-break1-start="${sc.break1StartHhmm}"
          th:data-break1-end="${sc.break1EndHhmm}"
          th:data-break2-start="${sc.break2StartHhmm}"
          th:data-break2-end="${sc.break2EndHhmm}"
          th:data-work-min="${sc.workMinutes}">
    </span>
</div>

<script th:src="@{/js/request-general.js}"></script>
</div><!-- /layout:fragment="content" -->
</body>
</html>
