<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>기타근태 신청</title>
    <style>
        .req-page { max-width: 1200px; padding: 20px 24px; }
        .page-title { font-size: 18px; font-weight: 700; color: #2c3e50; margin-bottom: 18px; }

        .search-panel {
            background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px;
            padding: 14px 18px; display: flex; flex-wrap: wrap; gap: 12px;
            align-items: flex-end; margin-bottom: 18px;
        }
        .search-group { display: flex; flex-direction: column; gap: 4px; }
        .search-group label { font-size: 12px; color: #555; font-weight: 600; }
        .search-group select,
        .search-group input { padding: 6px 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; font-family: 'Malgun Gothic', sans-serif; }
        .btn-search { padding: 7px 20px; background: #2c3e50; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: 'Malgun Gothic', sans-serif; }
        .btn-search:hover { background: #1a252f; }

        .req-table-wrap { overflow-x: auto; margin-bottom: 12px; }
        .req-table { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 900px; }
        .req-table thead th {
            background: #2c3e50; color: #fff; padding: 9px 8px;
            text-align: center; border-right: 1px solid #3d5166; white-space: nowrap;
        }
        .req-table thead th:last-child { border-right: none; }
        .req-table tbody tr { border-bottom: 1px solid #e8eaed; cursor: pointer; }
        .req-table tbody tr:hover { background: #f0f4f8; }
        .req-table tbody tr.selected { background: #d6eaf8 !important; }
        .req-table tbody td { padding: 5px 8px; text-align: center; vertical-align: middle; }
        .req-table td select,
        .req-table td input[type="text"] {
            width: 100%; padding: 4px 6px; border: 1px solid #ced4da; border-radius: 3px;
            font-size: 12px; font-family: 'Malgun Gothic', sans-serif; box-sizing: border-box;
        }
        .req-table td select:focus,
        .req-table td input[type="text"]:focus { border-color: #2c3e50; outline: none; }

        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
        .badge-draft    { background: #e8e8e8; color: #555; }
        .badge-submit   { background: #d5e8fd; color: #1a5276; }
        .badge-approved { background: #d5f5e3; color: #1e8449; }
        .badge-rejected { background: #fde8e8; color: #922b21; }

        .action-bar { display: flex; gap: 8px; justify-content: flex-end; padding-top: 10px; border-top: 1px solid #e0e0e0; }
        .btn-act { padding: 7px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: 'Malgun Gothic', sans-serif; font-weight: 600; }
        .btn-save           { background: #2980b9; color: #fff; }
        .btn-delete         { background: #e74c3c; color: #fff; }
        .btn-submit         { background: #27ae60; color: #fff; }
        .btn-cancel-submit  { background: #f39c12; color: #fff; }
        .btn-act:hover { opacity: 0.85; }
        .no-data { text-align: center; padding: 30px; color: #95a5a6; font-size: 13px; }

        #toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 6px; color: #fff; font-size: 13px; display: none; z-index: 9999; }
        #toast.success { background: #27ae60; }
        #toast.error   { background: #e74c3c; }
    </style>
</head>
<body>
<div layout:fragment="content">
<div class="req-page">
    <div class="page-title">기타근태 신청</div>

    <!-- 검색 조건 -->
    <div class="search-panel">
        <div class="search-group">
            <label>근무일</label>
            <input type="date" id="workDate" th:value="${today}">
        </div>
        <div class="search-group">
            <label>부서</label>
            <select id="deptCode" th:disabled="${!isDeptLeader}">
                <option th:each="dept : ${depts}"
                        th:value="${dept.deptCode}"
                        th:text="${dept.deptName}"
                        th:selected="${dept.deptCode == myDeptCode}">
                </option>
            </select>
        </div>
        <div class="search-group">
            <label>근무계획</label>
            <select id="workPlanFilter">
                <option value="">전체</option>
                <option th:each="sc : ${shiftCodes}"
                        th:value="${sc.shiftCode}"
                        th:text="${sc.shiftName}">
                </option>
            </select>
        </div>
        <div class="search-group" th:if="${isDeptLeader}">
            <label>사번</label>
            <input type="text" id="empCodeFilter" placeholder="전체">
        </div>
        <button class="btn-search" onclick="doSearch()">조회</button>
    </div>

    <!-- 결과 테이블 -->
    <div class="req-table-wrap">
        <table class="req-table">
            <thead>
            <tr>
                <th style="width:36px;"></th>
                <th style="width:80px;">사번</th>
                <th style="width:75px;">성명</th>
                <th style="width:100px;">부서</th>
                <th style="width:100px;">근무계획</th>
                <th style="width:150px;">변경 근무계획</th>
                <th style="width:200px;">사유</th>
                <th style="width:70px;">상태</th>
                <th style="width:70px;">신청자</th>
            </tr>
            </thead>
            <tbody id="reqTableBody">
                <tr><td colspan="9" class="no-data">조회 버튼을 클릭하세요.</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 변경 가능한 근무계획 옵션 (hidden → JS에서 사용) -->
    <div style="display:none;" id="shiftOptionsData">
        <span th:each="sc : ${shiftCodes}"
              th:data-code="${sc.shiftCode}"
              th:data-name="${sc.shiftName}">
        </span>
    </div>

    <!-- 액션 버튼 -->
    <div class="action-bar">
        <button class="btn-act btn-save"          onclick="doSave()">저장</button>
        <button class="btn-act btn-delete"         onclick="doDelete()">삭제</button>
        <button class="btn-act btn-submit"         onclick="doSubmit()">상신</button>
        <button class="btn-act btn-cancel-submit"  onclick="doCancelSubmit()">상신취소</button>
    </div>
</div>
<div id="toast"></div>
</div>

<script>
    let tableData = [];
    let shiftOptions = '';

    function buildShiftOptions(selected) {
        // shiftOptionsData div에서 옵션 빌드
        const spans = document.querySelectorAll('#shiftOptionsData span');
        let opts = '<option value="">-- 선택 --</option>';
        spans.forEach(sp => {
            const code = sp.dataset.code, name = sp.dataset.name;
            opts += '<option value="'+code+'"'+(code===selected?' selected':'')+'>'+name+'</option>';
        });
        return opts;
    }

    function statusBadge(status) {
        const map = {DRAFT:'badge-draft',SUBMITTED:'badge-submit',APPROVED:'badge-approved',REJECTED:'badge-rejected'};
        const lbl = {DRAFT:'미상신',SUBMITTED:'승인중',APPROVED:'승인완료',REJECTED:'반려'};
        const s = status||'DRAFT';
        return '<span class="badge '+(map[s]||'badge-draft')+'">'+(lbl[s]||s)+'</span>';
    }

    function renderTable(rows) {
        const tbody = document.getElementById('reqTableBody');
        if (!rows || rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="no-data">조회된 인원이 없습니다.</td></tr>';
            tableData = [];
            return;
        }
        tableData = rows;
        tbody.innerHTML = rows.map((r, idx) => {
            const locked = (r.status === 'SUBMITTED' || r.status === 'APPROVED');
            const dis = locked ? 'disabled' : '';
            return '<tr data-idx="'+idx+'" onclick="selectRow(this)">'
                + '<td><input type="checkbox" onclick="event.stopPropagation();toggleCheck(this)"></td>'
                + '<td>'+(r.empCode||'')+'</td>'
                + '<td>'+(r.empName||'')+'</td>'
                + '<td>'+(r.deptName||'')+'</td>'
                + '<td>'+(r.workPlanName||'-')+'</td>'
                + '<td><select data-field="requestWorkCode" '+dis+'>'+buildShiftOptions(r.requestWorkCode)+'</select></td>'
                + '<td><input type="text" data-field="reason" value="'+(r.reason||'')+'" placeholder="사유 입력" '+dis+'></td>'
                + '<td>'+statusBadge(r.status)+'</td>'
                + '<td>'+(r.requesterName||'')+'</td>'
                + '</tr>';
        }).join('');
    }

    function selectRow(tr) {
        const cb = tr.querySelector('input[type="checkbox"]');
        if (cb) { cb.checked = !cb.checked; }
        tr.classList.toggle('selected', cb ? cb.checked : !tr.classList.contains('selected'));
    }

    function toggleCheck(cb) {
        cb.closest('tr').classList.toggle('selected', cb.checked);
    }

    function getSelectedRows() {
        return Array.from(document.querySelectorAll('#reqTableBody tr.selected'));
    }

    function rowToDto(tr) {
        const idx = parseInt(tr.dataset.idx);
        const d = tableData[idx];
        return {
            requestId:       d.requestId||null,
            empCode:         d.empCode,
            workDate:        document.getElementById('workDate').value,
            requestCategory: 'OTHER',
            requestWorkCode: tr.querySelector('[data-field="requestWorkCode"]').value,
            reason:          tr.querySelector('[data-field="reason"]').value,
            startTime:       null,
            endTime:         null
        };
    }

    async function doSearch() {
        const workDate      = document.getElementById('workDate').value;
        const deptEl        = document.getElementById('deptCode');
        const empEl         = document.getElementById('empCodeFilter');
        const workPlanEl    = document.getElementById('workPlanFilter');
        const deptCode      = deptEl ? deptEl.value : '';
        const empCode       = empEl  ? empEl.value  : '';
        const workPlanFilter= workPlanEl ? workPlanEl.value : '';
        if (!workDate) { showToast('근무일을 선택하세요.','error'); return; }
        if (!deptCode) { showToast('부서를 선택하세요.','error'); return; }

        const params = new URLSearchParams({workDate, deptCode, empCode, workPlanFilter});
        const res = await fetch('/attendance/request/other/search?'+params);
        if (!res.ok) { showToast('조회 중 오류가 발생했습니다.','error'); return; }
        renderTable(await res.json());
    }

    async function doSave() {
        const selected = getSelectedRows();
        if (selected.length === 0) { showToast('선택된 행이 없습니다.','error'); return; }
        for (const tr of selected) {
            const dto = rowToDto(tr);
            if (!dto.requestWorkCode) { showToast('변경 근무계획을 선택하세요.','error'); return; }
            const res = await fetch('/attendance/request/save', {
                method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(dto)
            });
            const json = await res.json();
            if (!json.success) { showToast(json.message||'저장 실패','error'); return; }
            tableData[parseInt(tr.dataset.idx)].requestId = json.requestId;
        }
        showToast('저장되었습니다.','success');
        doSearch();
    }

    async function doDelete() {
        const selected = getSelectedRows();
        if (selected.length === 0) { showToast('선택된 행이 없습니다.','error'); return; }
        if (!confirm('선택한 근태신청을 삭제하시겠습니까?')) return;
        for (const tr of selected) {
            const requestId = tableData[parseInt(tr.dataset.idx)].requestId;
            if (!requestId) { showToast('저장되지 않은 행은 삭제할 수 없습니다.','error'); return; }
            const res = await fetch('/attendance/request/delete', {
                method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({requestId})
            });
            const json = await res.json();
            if (!json.success) { showToast(json.message||'삭제 실패','error'); return; }
        }
        showToast('삭제되었습니다.','success');
        doSearch();
    }

    async function doSubmit() {
        const selected = getSelectedRows();
        if (selected.length === 0) { showToast('선택된 행이 없습니다.','error'); return; }
        for (const tr of selected) {
            const idx = parseInt(tr.dataset.idx);
            let requestId = tableData[idx].requestId;
            if (!requestId) {
                const dto = rowToDto(tr);
                if (!dto.requestWorkCode) { showToast('변경 근무계획을 선택하세요.','error'); return; }
                const sr = await fetch('/attendance/request/save', {
                    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(dto)
                });
                const sj = await sr.json();
                if (!sj.success) { showToast(sj.message||'저장 실패','error'); return; }
                requestId = sj.requestId;
                tableData[idx].requestId = requestId;
            }
            const res = await fetch('/attendance/request/submit', {
                method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({requestId})
            });
            const json = await res.json();
            if (!json.success) { showToast(json.message||'상신 실패','error'); return; }
        }
        showToast('상신되었습니다.','success');
        doSearch();
    }

    async function doCancelSubmit() {
        const selected = getSelectedRows();
        if (selected.length === 0) { showToast('선택된 행이 없습니다.','error'); return; }
        if (!confirm('상신을 취소하시겠습니까?')) return;
        for (const tr of selected) {
            const requestId = tableData[parseInt(tr.dataset.idx)].requestId;
            if (!requestId) { showToast('저장된 신청건만 상신취소할 수 있습니다.','error'); return; }
            const res = await fetch('/attendance/request/cancel-submit', {
                method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({requestId})
            });
            const json = await res.json();
            if (!json.success) { showToast(json.message||'상신취소 실패','error'); return; }
        }
        showToast('상신취소되었습니다.','success');
        doSearch();
    }

    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = type; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    document.addEventListener('DOMContentLoaded', doSearch);
</script>
</body>
</html>
