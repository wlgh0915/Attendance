<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>근태신청내역</title>
    <link rel="stylesheet" th:href="@{/css/request-history.css}">
</head>
<body>
<div layout:fragment="content">
<div class="hist-page">

    <!-- 페이지 헤더 -->
    <div class="rh-top">
        <div>
            <h2 class="page-title">근태신청내역</h2>
            <p class="rh-subtitle">모든 부서 및 임직원의 근태 신청 내역을 관리하고 승인할 수 있습니다.</p>
        </div>
    </div>

    <!-- 검색 필터 -->
    <form class="search-panel" method="get" th:action="@{/attendance/request/history}">
        <div class="search-group date-group">
            <label>기간</label>
            <div class="date-range">
                <input type="date" name="fromDate" th:value="${search.fromDate}">
                <span>~</span>
                <input type="date" name="toDate" th:value="${search.toDate}">
            </div>
        </div>

        <div class="search-group" th:if="${canViewAll}">
            <label>부서</label>
            <select name="deptCode">
                <option value="" th:selected="${search.deptCode == null or search.deptCode == ''}">전체 부서</option>
                <option th:each="dept : ${depts}"
                        th:value="${dept.deptCode}"
                        th:text="${dept.deptName}"
                        th:selected="${dept.deptCode == search.deptCode}">
                </option>
            </select>
        </div>

        <div class="search-group" th:if="${canViewAll}">
            <label>사번 / 성명</label>
            <input type="text" name="empCode" placeholder="사번 또는 이름 검색" th:value="${search.empCode}">
        </div>

        <div class="search-group">
            <label>유형</label>
            <select name="requestCategory">
                <option value="ALL" th:selected="${search.requestCategory == null || search.requestCategory == '' || search.requestCategory == 'ALL'}">전체 유형</option>
                <option value="OVERTIME" th:selected="${search.requestCategory == 'OVERTIME'}">연장근로</option>
                <option value="HOLIDAY" th:selected="${search.requestCategory == 'HOLIDAY'}">휴일근무</option>
                <option value="LEAVE" th:selected="${search.requestCategory == 'LEAVE'}">조퇴/외출/반차</option>
                <option value="OTHER" th:selected="${search.requestCategory == 'OTHER'}">기타근태</option>
            </select>
        </div>

        <div class="search-group">
            <label>상태</label>
            <select name="status">
                <option value="ALL" th:selected="${search.status == null || search.status == '' || search.status == 'ALL'}">전체 상태</option>
                <option value="DRAFT" th:selected="${search.status == 'DRAFT'}">미상신</option>
                <option value="SUBMITTED" th:selected="${search.status == 'SUBMITTED'}">승인중</option>
                <option value="APPROVED" th:selected="${search.status == 'APPROVED'}">승인</option>
                <option value="REJECTED" th:selected="${search.status == 'REJECTED'}">반려</option>
                <option value="CANCELED" th:selected="${search.status == 'CANCELED'}">취소</option>
            </select>
        </div>

        <div class="search-group btn-group">
            <label class="label-spacer">검색</label>
            <button class="btn-search" type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                검색하기
            </button>
        </div>
    </form>

    <!-- 테이블 카드 -->
    <div class="hist-table-card">
        <div class="hist-card-header">
            <div class="hist-summary">
                검색 결과: <span th:text="${#lists.size(rows)}">0</span>건
            </div>
        </div>

        <div class="hist-table-wrap">
            <table class="hist-table">
                <thead>
                <tr>
                    <th>근무일</th>
                    <th>대상자</th>
                    <th>부서</th>
                    <th>신청유형</th>
                    <th>시간</th>
                    <th class="th-center">근무분</th>
                    <th>사유</th>
                    <th class="th-center">상태</th>
                    <th>신청자</th>
                    <th>신청일시</th>
                    <th class="th-center">상세</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(rows)}">
                    <td colspan="11" class="no-data">조회된 신청내역이 없습니다.</td>
                </tr>
                <tr th:each="row : ${rows}">
                    <td th:text="${row.requestCategory == 'OTHER' and row.endDate != null and row.endDate != row.workDate ? row.workDate + ' ~ ' + row.endDate : row.workDate}"></td>
                    <td>
                        <span th:text="${row.empName ?: '-'}"></span>
                        <span class="sub-text" th:text="${row.empCode}"></span>
                    </td>
                    <td th:text="${row.deptName ?: row.deptCode}"></td>
                    <td>
                        <span class="type-badge" th:text="${row.requestCategory == 'OTHER' ? (row.changeShiftName ?: row.requestWorkCode ?: row.requestCategory) : (row.requestWorkCode ?: row.requestCategory)}"></span>
                    </td>
                    <td>
                        <span th:if="${row.startTime != null || row.endTime != null}"
                              th:text="${(row.startTimeType == 'N1' ? '익일 ' : '') + (row.startTime ?: '--:--') + ' ~ ' + (row.endTimeType == 'N1' ? '익일 ' : '') + (row.endTime ?: '--:--')}"></span>
                        <span th:if="${row.startTime == null && row.endTime == null}">-</span>
                    </td>
                    <td style="text-align:center;" th:text="${row.requestWorkMin != null ? row.requestWorkMin : '-'}"></td>
                    <td>
                        <span th:text="${row.reason ?: '-'}"></span>
                        <span class="sub-text" th:if="${row.reasonDetail != null and row.reasonDetail != ''}"
                              th:text="${row.reasonDetail}"></span>
                    </td>
                    <td style="text-align:center;">
                        <span th:class="${'status-badge st-' + row.status}"
                              th:text="${row.status == 'DRAFT' ? '미상신' :
                                        row.status == 'SUBMITTED' ? '승인중' :
                                        row.status == 'APPROVED' ? '승인' :
                                        row.status == 'REJECTED' ? '반려' :
                                        row.status == 'CANCELED' ? '취소' : row.status}">
                        </span>
                    </td>
                    <td>
                        <span th:text="${row.requesterName ?: '-'}"></span>
                        <span class="sub-text" th:text="${row.requesterCode}"></span>
                    </td>
                    <td th:text="${row.requestedAt ?: '-'}"></td>
                    <td style="text-align:center;">
                        <button type="button" class="btn-detail"
                                th:attr="data-request-id=${row.requestId}"
                                onclick="openHistoryDetail(this)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div><!-- /hist-page -->

<!-- 드로어 backdrop -->
<div class="drawer-overlay" onclick="closeHistoryDetail()"></div>

<!-- 상세 드로어 -->
<div id="detailModal" class="detail-drawer">
    <div class="detail-drawer-header">
        <div class="drawer-title-area">
            <div class="drawer-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="#2563eb" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
            </div>
            <div>
                <span class="modal-title">근태 신청 상세</span>
                <span class="modal-subtitle">Request Details View</span>
            </div>
        </div>
        <button type="button" class="btn-drawer-close" onclick="closeHistoryDetail()">✕</button>
    </div>

    <div class="drawer-body">
        <div class="detail-section">
            <h4>신청 정보</h4>
            <div class="detail-grid" id="detailInfo"></div>
        </div>
        <div class="detail-section">
            <h4>결재선</h4>
            <table class="chain-table">
                <thead>
                <tr><th>순번</th><th>구분</th><th>결재자</th><th>상태</th><th>처리일시</th><th>반려사유</th></tr>
                </thead>
                <tbody id="chainBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script th:src="@{/js/request-history.js}"></script>
</div>
</body>
</html>
