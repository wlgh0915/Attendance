<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>근태 캘린더</title>
    <link rel="stylesheet" th:href="@{/css/calendar.css}">
</head>
<body>
<div layout:fragment="content">
<div class="cal-page">

    <!-- 상단 헤더 -->
    <div class="cal-top">
        <div class="cal-top-left">
            <h2 class="cal-title">근태 캘린더</h2>
            <p class="cal-subtitle" th:if="${empInfo != null}"
               th:text="${(empInfo['deptName'] ?: '') + ' | ' + (empInfo['empName'] ?: '') + ' (' + targetEmp + ')'}">
            </p>
        </div>
        <div class="cal-top-right">
            <div class="cal-nav">
                <a th:href="@{/attendance/calendar(ym=${prevYm}, empCode=${targetEmp}, deptCode=${selectedDept})}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </a>
                <span class="ym-label" th:text="${ymDisplay}"></span>
                <a th:href="@{/attendance/calendar(ym=${nextYm}, empCode=${targetEmp}, deptCode=${selectedDept})}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
            </div>
            <button type="button" class="btn-generate" th:if="${isAdmin}" onclick="generateDeptRecords()">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                부서 실적 자동생성
            </button>
        </div>
    </div>

    <!-- 필터 -->
    <div class="cal-filters" th:if="${isAdmin or canViewAll}">
        <div class="filter-item" th:if="${isAdmin}">
            <label class="filter-label">부서</label>
            <select id="deptSelect" class="filter-select" onchange="onDeptChange(this.value)">
                <option th:each="d : ${depts}"
                        th:value="${d.deptCode}"
                        th:text="${d.deptName}"
                        th:selected="${d.deptCode == selectedDept}">
                </option>
            </select>
        </div>
        <div class="filter-item" th:if="${canViewAll}">
            <label class="filter-label">사원</label>
            <select id="empSelect" class="filter-select" onchange="onEmpChange(this.value)">
                <option value="">-- 선택 --</option>
                <option th:each="e : ${emps}"
                        th:value="${e.empCode}"
                        th:text="${e.empName + ' (' + e.empCode + ')'}"
                        th:selected="${e.empCode == targetEmp}">
                </option>
            </select>
        </div>
        <div class="filter-item" th:if="${isAdmin}">
            <label class="filter-label">실적 반영일</label>
            <div class="date-input-wrap">
                <input type="date" id="recordGenerateDate" class="filter-date">
                <svg class="date-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- 캘린더 + 사이드 패널 -->
    <div class="cal-main-area">

        <!-- 캘린더 카드 -->
        <div class="cal-container">
            <!-- 요일 헤더 -->
            <div class="cal-header-row">
                <div class="cal-header-cell cal-header-sun">일</div>
                <div class="cal-header-cell">월</div>
                <div class="cal-header-cell">화</div>
                <div class="cal-header-cell">수</div>
                <div class="cal-header-cell">목</div>
                <div class="cal-header-cell">금</div>
                <div class="cal-header-cell cal-header-sat">토</div>
            </div>
            <!-- 캘린더 셀 (JS가 채움) -->
            <div id="calGrid" class="cal-grid"></div>
        </div>

        <!-- 사이드 통계 패널 -->
        <div class="cal-sidebar">
            <div class="cal-stat-card">
                <div class="cal-stat-icon icon-blue">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                         fill="none" stroke="#2563eb" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </div>
                <p class="cal-stat-label">월 신청 기준</p>
                <p class="cal-stat-value" id="totalMinDisplay">-</p>
                <p class="cal-stat-desc">근태 신청 기준 예상 근무시간</p>
            </div>
            <div class="cal-stat-card">
                <div class="cal-stat-icon icon-green">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                         fill="none" stroke="#16a34a" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </div>
                <p class="cal-stat-label">월 급여 산정 기준</p>
                <p class="cal-stat-value" id="totalActualMinDisplay">-</p>
                <p class="cal-stat-desc">실 출근 기준 급여 산정 시간</p>
            </div>
        </div>

    </div><!-- /cal-main-area -->

</div><!-- /cal-page -->

<div id="toast"></div>

<script th:inline="javascript">
    const DAYS          = /*[[${days}]]*/ [];
    const CURRENT_YM    = /*[[${currentYm}]]*/ '';
    const TARGET_EMP    = /*[[${targetEmp}]]*/ '';
    const SELECTED_DEPT = /*[[${selectedDept}]]*/ '';
    const CAN_VIEW_ALL  = /*[[${canViewAll}]]*/ false;
    const IS_ADMIN      = /*[[${isAdmin}]]*/ false;
</script>
<script th:src="@{/js/calendar.js}"></script>
</div><!-- /layout:fragment="content" -->
</body>
</html>
