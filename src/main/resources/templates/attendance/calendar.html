<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <meta charset="UTF-8">
    <title>근태 캘린더</title>
    <link rel="stylesheet" th:href="@{/css/calendar.css}">
</head>
<body>
<div layout:fragment="content">
<div class="cal-page">

    <!-- 상단 컨트롤 -->
    <div class="cal-top">
        <div class="cal-nav">
            <a th:href="@{/attendance/calendar(ym=${prevYm}, empCode=${targetEmp}, deptCode=${selectedDept})}">◀</a>
            <span class="ym-label" th:text="${ymDisplay}"></span>
            <a th:href="@{/attendance/calendar(ym=${nextYm}, empCode=${targetEmp}, deptCode=${selectedDept})}">▶</a>
        </div>

        <!-- 관리자: 부서 선택 -->
        <div class="filter-group" th:if="${isAdmin}">
            <label>부서</label>
            <select id="deptSelect" onchange="onDeptChange(this.value)">
                <option th:each="d : ${depts}"
                        th:value="${d.deptCode}"
                        th:text="${d.deptName}"
                        th:selected="${d.deptCode == selectedDept}">
                </option>
            </select>
        </div>

        <!-- 관리자 or 부서장: 사원 선택 -->
        <div class="filter-group" th:if="${canViewAll}">
            <label>사원</label>
            <select id="empSelect" onchange="onEmpChange(this.value)">
                <option value="">-- 선택 --</option>
                <option th:each="e : ${emps}"
                        th:value="${e.empCode}"
                        th:text="${e.empName + ' (' + e.empCode + ')'}"
                        th:selected="${e.empCode == targetEmp}">
                </option>
            </select>
        </div>

        <div class="filter-group" th:if="${isAdmin}">
            <label>실적 반영일</label>
            <input type="date" id="recordGenerateDate">
        </div>
        <button type="button" class="btn-generate-records" th:if="${isAdmin}" onclick="generateDeptRecords()">
            부서 실적 자동생성
        </button>

        <div class="emp-badge" th:if="${empInfo != null}"
             th:text="${(empInfo['deptName'] ?: '') + ' | ' + (empInfo['empName'] ?: '') + ' (' + targetEmp + ')'}">
        </div>
    </div>

    <!-- 캘린더 -->
    <table class="cal-grid">
        <thead>
        <tr>
            <th class="th-sun" rowspan="2">일</th>
            <th rowspan="2">월</th><th rowspan="2">화</th><th rowspan="2">수</th><th rowspan="2">목</th><th rowspan="2">금</th>
            <th class="th-sat" rowspan="2">토</th>
            <th class="th-week" colspan="2">주간합계</th>
        </tr>
        <tr>
            <th class="th-week-sub">신청 기준</th>
            <th class="th-week-sub">급여 산정 기준</th>
        </tr>
        </thead>
        <tbody id="calBody"></tbody>
    </table>
    <div id="monthTotal" class="month-total"></div>
</div><!-- /cal-page -->

<div id="toast"></div>

<script th:inline="javascript">
    const DAYS          = /*[[${days}]]*/ [];
    const CURRENT_YM    = /*[[${currentYm}]]*/ '';
    const TARGET_EMP    = /*[[${targetEmp}]]*/ '';
    const SELECTED_DEPT = /*[[${selectedDept}]]*/ '';
    const CAN_VIEW_ALL  = /*[[${canViewAll}]]*/ false;
    const IS_ADMIN      = /*[[${isAdmin}]]*/ false;
</script>
<script th:src="@{/js/calendar.js}"></script>
</div><!-- /layout:fragment="content" -->
</body>
</html>
